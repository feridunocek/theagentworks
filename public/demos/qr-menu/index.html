<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Dijital Menü Oluşturucu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #111111;
    --bg-card: #1a1a1a;
    --border: #2a2a2a;
    --text-primary: #f5f5f5;
    --text-secondary: #a0a0a0;
    --accent: #f59e0b;
    --accent-hover: #d97706;
    --popular-badge: #f59e0b;
    --delete: #ef4444;
  }

  body {
    font-family: 'DM Sans', Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .app-header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .app-header h1 span.accent { color: var(--accent); }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .save-indicator {
    font-size: 12px;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .save-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
  }

  /* MAIN LAYOUT */
  .app-body {
    display: flex;
    height: calc(100vh - 56px);
  }

  /* LEFT PANEL */
  .editor-panel {
    width: 50%;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .editor-panel::-webkit-scrollbar { width: 4px; }
  .editor-panel::-webkit-scrollbar-track { background: transparent; }
  .editor-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* SECTION */
  .section {
    border-bottom: 1px solid var(--border);
  }
  .section-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: rgba(255,255,255,0.02); }
  .section-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title svg { color: var(--accent); }
  .chevron {
    transition: transform 0.2s;
    color: var(--text-secondary);
  }
  .chevron.open { transform: rotate(180deg); }
  .section-body {
    padding: 0 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .section-body.collapsed { display: none; }

  /* FORM ELEMENTS */
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .form-input {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
    width: 100%;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text-secondary); opacity: 0.6; }

  /* THEME COLOR PICKER */
  .color-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .color-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.15s, border-color 0.15s;
  }
  .color-dot:hover { transform: scale(1.15); }
  .color-dot.selected { border-color: white; transform: scale(1.1); }

  /* CATEGORY TABS */
  .category-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .category-tab {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    background: transparent;
  }
  .category-tab:hover { background: rgba(255,255,255,0.04); }
  .category-tab.active {
    background: rgba(245, 158, 11, 0.1);
    border-color: rgba(245, 158, 11, 0.3);
  }
  .category-tab-icon { font-size: 16px; }
  .category-tab-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
  }
  .category-badge {
    font-size: 11px;
    background: var(--bg-card);
    color: var(--text-secondary);
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }
  .category-tab.active .category-badge {
    background: rgba(245,158,11,0.2);
    color: var(--accent);
  }
  .category-delete-btn {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    padding: 2px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .category-tab:hover .category-delete-btn { opacity: 1; }
  .category-delete-btn:hover { color: var(--delete); }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 8px;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    width: 100%;
    margin-top: 4px;
  }
  .add-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(245,158,11,0.04);
  }

  /* MENU ITEMS */
  .menu-items-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .menu-item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    transition: border-color 0.15s;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .menu-item-row:hover { border-color: rgba(255,255,255,0.08); }

  .item-thumb {
    width: 44px; height: 44px;
    border-radius: 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  .item-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 7px;
  }
  .item-thumb-placeholder {
    font-size: 20px;
    opacity: 0.5;
  }
  .item-thumb-shimmer {
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.06) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 7px;
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-desc {
    font-size: 11px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .item-price {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .item-actions {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }
  .icon-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 5px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    color: var(--text-secondary);
    transition: all 0.15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text-primary); }
  .icon-btn.popular { color: var(--text-secondary); }
  .icon-btn.popular.active { color: var(--accent); }
  .icon-btn.image-btn { }
  .icon-btn.image-btn.has-image { color: #22c55e; }
  .icon-btn.delete-btn:hover { color: var(--delete); }

  /* INLINE ADD FORM */
  .inline-form {
    background: var(--bg-primary);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: slideIn 0.2s ease;
  }
  .inline-form-row {
    display: flex;
    gap: 10px;
  }
  .inline-form-row .form-input { flex: 1; }
  .inline-form-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .btn-save {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 7px;
    padding: 7px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--accent-hover); }
  .btn-cancel {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { border-color: var(--text-secondary); color: var(--text-primary); }

  /* NEW CATEGORY FORM */
  .new-cat-form {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    animation: slideIn 0.2s ease;
  }
  .new-cat-form .form-input { flex: 1; }
  .emoji-input { width: 60px; text-align: center; }

  /* RIGHT PANEL */
  .preview-panel {
    width: 50%;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 20px;
    overflow-y: auto;
    gap: 20px;
  }
  .preview-panel::-webkit-scrollbar { width: 4px; }
  .preview-panel::-webkit-scrollbar-track { background: transparent; }
  .preview-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* PHONE FRAME */
  .phone-wrapper {
    position: relative;
    flex-shrink: 0;
  }
  .phone-frame {
    width: 320px;
    height: 620px;
    background: #1a1a2e;
    border-radius: 40px;
    border: 8px solid #2a2a3e;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.05),
      0 30px 60px rgba(0,0,0,0.5),
      inset 0 0 0 1px rgba(255,255,255,0.03);
    overflow: hidden;
    position: relative;
  }
  .phone-notch {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 90px; height: 22px;
    background: #2a2a3e;
    border-radius: 0 0 14px 14px;
    z-index: 10;
  }
  .phone-screen {
    width: 100%; height: 100%;
    overflow: hidden;
    border-radius: 32px;
  }

  /* MENU PREVIEW INSIDE PHONE */
  .menu-preview {
    height: 100%;
    overflow-y: auto;
    font-family: 'DM Sans', sans-serif;
  }
  .menu-preview::-webkit-scrollbar { width: 0; }

  .menu-preview-header {
    padding: 32px 16px 16px;
    text-align: center;
  }
  .menu-preview-name {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .menu-preview-tagline {
    font-size: 12px;
    opacity: 0.7;
    margin-bottom: 0;
  }

  .menu-categories {
    display: flex;
    gap: 8px;
    padding: 0 12px 12px;
    overflow-x: auto;
  }
  .menu-categories::-webkit-scrollbar { display: none; }
  .menu-cat-pill {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid transparent;
  }

  .menu-items-preview {
    padding: 0 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .menu-item-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
    background: white;
    position: relative;
    transition: all 0.15s;
  }
  .menu-item-card-img {
    width: 52px; height: 52px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    background: #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    overflow: hidden;
  }
  .menu-item-card-img img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }
  .menu-item-card-info { flex: 1; min-width: 0; }
  .menu-item-card-name {
    font-size: 12px;
    font-weight: 700;
    color: #111;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .menu-item-card-desc {
    font-size: 10px;
    color: #6b7280;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.4;
  }
  .menu-item-card-price {
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .popular-badge {
    position: absolute;
    top: -1px; right: -1px;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 0 11px 0 8px;
    color: white;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* QR AREA */
  .qr-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 320px;
  }
  .qr-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 11px 28px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    justify-content: center;
  }
  .qr-btn:hover {
    background: var(--accent-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(245,158,11,0.3);
  }
  .qr-canvas-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .qr-canvas-wrapper canvas {
    border-radius: 12px;
    border: 4px solid white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    cursor: pointer;
  }
  .qr-hint {
    font-size: 11px;
    color: var(--text-secondary);
    text-align: center;
  }

  /* MOBILE PREVIEW TOGGLE */
  .preview-toggle {
    display: none;
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(245,158,11,0.4);
    align-items: center;
    justify-content: center;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg-card);
    color: var(--text-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(34,197,94,0.4); }
  .toast.error { border-color: rgba(239,68,68,0.4); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-secondary);
  }
  .empty-state-icon { font-size: 36px; margin-bottom: 8px; opacity: 0.5; }
  .empty-state p { font-size: 13px; }

  /* RESPONSIVE */
  @media (max-width: 1024px) {
    .app-body { flex-direction: column; height: auto; }
    .editor-panel { width: 100%; height: auto; max-height: none; overflow-y: visible; }
    .preview-panel { width: 100%; display: none; }
    .preview-panel.mobile-visible { display: flex; }
    .preview-toggle { display: flex; }
  }

  @media (max-width: 768px) {
    .phone-frame { width: 280px; height: 540px; }
  }

  /* SECTION ANIMATION */
  .section-body { transition: none; }

  /* ITEMS FADE */
  .items-container {
    animation: fadeIn 0.2s ease;
  }
</style>
</head>
<body>

<header class="app-header">
  <h1>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
      <rect x="3" y="3" width="7" height="7" rx="1"/>
      <rect x="14" y="3" width="7" height="7" rx="1"/>
      <rect x="3" y="14" width="7" height="7" rx="1"/>
      <rect x="14" y="14" width="3" height="3" rx="0.5"/>
      <rect x="18" y="14" width="3" height="3" rx="0.5"/>
      <rect x="14" y="18" width="3" height="3" rx="0.5"/>
      <rect x="18" y="18" width="3" height="3" rx="0.5"/>
    </svg>
    QR <span class="accent">Dijital Menü</span> Oluşturucu
  </h1>
  <div class="header-right">
    <div class="save-indicator" id="saveIndicator">
      <div class="save-dot"></div>
      <span>Kaydedildi</span>
    </div>
  </div>
</header>

<div class="app-body">

  <!-- LEFT: EDITOR -->
  <div class="editor-panel" id="editorPanel">

    <!-- RESTAURANT SETTINGS -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('settings')">
        <div class="section-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
          Restoran Ayarları
        </div>
        <svg class="chevron open" id="settingsChevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body" id="settingsBody">
        <div class="form-group">
          <label class="form-label">Restoran Adı</label>
          <input class="form-input" id="restaurantName" type="text" placeholder="Restoran adınız" oninput="updateMenu()">
        </div>
        <div class="form-group">
          <label class="form-label">Slogan</label>
          <input class="form-input" id="restaurantTagline" type="text" placeholder="Kısa bir slogan..." oninput="updateMenu()">
        </div>
        <div class="form-group">
          <label class="form-label">Menü Tema Rengi</label>
          <div class="color-options" id="colorOptions"></div>
        </div>
      </div>
    </div>

    <!-- CATEGORIES -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('categories')">
        <div class="section-title">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h7"/></svg>
          Kategoriler
        </div>
        <svg class="chevron open" id="categoriesChevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="section-body" id="categoriesBody">
        <div class="category-list" id="categoryList"></div>
        <div id="newCatForm" style="display:none;">
          <div class="new-cat-form">
            <input class="form-input emoji-input" id="newCatEmoji" type="text" placeholder="🍽️" maxlength="2">
            <input class="form-input" id="newCatName" type="text" placeholder="Kategori adı" onkeydown="if(event.key==='Enter')saveNewCategory()">
            <button class="btn-save" onclick="saveNewCategory()">Ekle</button>
            <button class="btn-cancel" onclick="hideNewCatForm()">İptal</button>
          </div>
        </div>
        <button class="add-btn" id="addCatBtn" onclick="showNewCatForm()">

// IMAGE GENERATION
async function generateImage(catIndex, itemId) {
  if (!FAL_KEY || FAL_KEY === 'FAL_KEY_BURAYA') {
    showToast('Fal AI anahtarı tanımlı değil', 'error');
    return;
  }
  const key = `${catIndex}-${itemId}`;
  if (pendingImageRequests.has(key)) return;
  pendingImageRequests.add(key);

  const cat = menuData.categories[catIndex];
  const item = cat.items.find(i => i.id === itemId);
  if (!item) { pendingImageRequests.delete(key); return; }

  const thumb = document.getElementById(`thumb-${itemId}`);
  if (thumb) {
    thumb.innerHTML = '<div class="item-thumb-shimmer"></div>';
  }

  const catPrompt = PHOTO_PROMPTS[cat.name] || "food photography, restaurant setting, professional";
  const prompt = `delicious ${item.name}, ${catPrompt}, professional food photography, 4k, appetizing`;

  try {
    const res = await fetch('https://fal.run/fal-ai/nano-banana-2', {
      method: 'POST',
      headers: {
        'Authorization': `Key ${FAL_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ prompt, image_size: 'square_hd' }),
    });
    const data = await res.json();
    if (data.images && data.images[0]) {
      item.image = data.images[0].url;
      saveMenu();
      renderItems();
      renderPreview();
      showToast('Görsel oluşturuldu ✓', 'success');
    } else {
      throw new Error('No image returned');
    }
  } catch(e) {
    if (thumb) {
      thumb.innerHTML = item.image
        ? `<img src="${item.image}" alt="${item.name}">`
        : '<span class="item-thumb-placeholder">🍴</span>';
    }
    showToast('Görsel oluşturulamadı', 'error');
  }
  pendingImageRequests.delete(key);
}

// QR CODE
function generateQR() {
  const output = document.getElementById('qrOutput');
  const canvas = document.createElement('canvas');
  const size = 200;
  const gridSize = 25;
  const cellSize = size / gridSize;
  canvas.width = size;
  canvas.height = size;
  canvas.title = 'QR kodunu indirmek için tıklayın';
  canvas.style.cursor = 'pointer';

  const ctx = canvas.getContext('2d');
  const text = menuData.restaurantName + Date.now();
  const seed = hashString(text);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, size, size);

  // Draw QR pattern with animation
  const cells = [];
  for (let row = 0; row < gridSize; row++) {
    for (let col = 0; col < gridSize; col++) {
      const inFinder = isInFinder(row, col, gridSize);
      let filled = false;
      if (inFinder) {
        filled = isFinderFilled(row, col, gridSize);
      } else {
        const rand = seededRandom(seed + row * gridSize + col);
        filled = rand > 0.5;
      }
      if (filled) cells.push({ row, col, x: col * cellSize, y: row * cellSize });
    }
  }

  let i = 0;
  function drawNext() {
    const batch = 15;
    ctx.fillStyle = '#000000';
    for (let b = 0; b < batch && i < cells.length; b++, i++) {
      const c = cells[i];
      ctx.fillRect(c.x + 0.5, c.y + 0.5, cellSize - 1, cellSize - 1);
    }
    if (i < cells.length) requestAnimationFrame(drawNext);
  }
  drawNext();

  canvas.onclick = () => {
    const link = document.createElement('a');
    link.download = `${menuData.restaurantName.replace(/\s+/g,'-')}-qr.png`;
    link.href = canvas.toDataURL();
    link.click();
    showToast('QR kod indirildi ✓', 'success');
  };

  output.innerHTML = '';
  const wrapper = document.createElement('div');
  wrapper.className = 'qr-canvas-wrapper';
  wrapper.appendChild(canvas);
  const hint = document.createElement('div');
  hint.className = 'qr-hint';
  hint.textContent = 'İndirmek için tıklayın';
  wrapper.appendChild(hint);
  output.appendChild(wrapper);
}

function isInFinder(row, col, g) {
  if (row < 7 && col < 7) return true;
  if (row < 7 && col >= g - 7) return true;
  if (row >= g - 7 && col < 7) return true;
  return false;
}

function isFinderFilled(row, col, g) {
  const patterns = [
    [0,0], [g-7,0]
  ].map(([dr, dc]) => ({ dr, dc }));
  patterns.push({ dr: 0, dc: g - 7 });

  for (const { dr, dc } of patterns) {
    const r = row - dr;
    const c = col - dc;
    if (r >= 0 && r < 7 && c >= 0 && c < 7) {
      if (r === 0 || r === 6 || c === 0 || c === 6) return true;
      if (r >= 2 && r <= 4 && c >= 2 && c <= 4) return true;
      return false;
    }
  }
  return false;
}

function hashString(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
  }
  return Math.abs(h);
}

function seededRandom(seed) {
  const x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

// MOBILE TOGGLE
function toggleMobileView() {
  const preview = document.getElementById('previewPanel');
  const btn = document.getElementById('mobileToggle');
  showingPreview = !showingPreview;
  if (showingPreview) {
    preview.classList.add('mobile-visible');
    document.getElementById('editorPanel').style.display = 'none';
    btn.textContent = '✏️';
  } else {
    preview.classList.remove('mobile-visible');
    document.getElementById('editorPanel').style.display = '';
    btn.textContent = '👁️';
  }
}

// TOAST
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// UTILS
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
